name: coda
channels:
  - defaults
dependencies:
  - python=3.10
  - pip
  - git
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu121
    - torch==2.2.0+cu121
    - torchvision==0.17.0+cu121
    - torchaudio==2.2.0+cu121
    - cython==3.2.4
    - numpy==1.26.4
    - scipy==1.15.3
    - librosa==0.11.0
    - einops==0.8.2
    - "madmom @ git+https://github.com/CPJKU/madmom.git"
    - opencv-python==4.11.0.86
    - PyYAML==6.0.3
    - tqdm==4.67.1
    - soundfile==0.13.1
    - tensorboard==2.20.0
    - matplotlib==3.10.8
    # mamba-ssm is intentionally omitted here.
    # Its prebuilt wheels often mismatch the local PyTorch ABI.
    # Install it from source after activating the environment:
    #   bash install.sh
